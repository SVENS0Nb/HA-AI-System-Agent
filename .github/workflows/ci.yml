name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            homeassistant-readonly-agent/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r homeassistant-readonly-agent/requirements.txt
          python -m pip install -r requirements-dev.txt
      - name: Unit tests
        env:
          PYTHONPATH: homeassistant-readonly-agent
        run: python -m unittest discover -s tests -v
      - name: Compile
        run: python -m compileall -q homeassistant-readonly-agent/app
      - name: Lint
        run: ruff check homeassistant-readonly-agent/app tests
      - name: Types
        run: mypy homeassistant-readonly-agent/app
      - name: Static security analysis
        run: bandit -q -r homeassistant-readonly-agent/app
      - name: Dependency audit
        run: pip-audit -r homeassistant-readonly-agent/requirements.txt --disable-pip

  container-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Build app image
        run: |
          docker build \
            --build-arg BUILD_VERSION=ci \
            --build-arg BUILD_ARCH=amd64 \
            --tag ha-ai-system-agent:ci \
            homeassistant-readonly-agent
      - name: Start integrated Signal bridge
        run: |
          set -eu
          docker run --detach \
            --name ha-ai-signal-smoke \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --entrypoint /usr/local/bin/signal-bridge-entrypoint \
            ha-ai-system-agent:ci
          cleanup() {
            docker logs ha-ai-signal-smoke || true
            docker rm --force ha-ai-signal-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          ready=false
          for _attempt in $(seq 1 60); do
            if docker exec ha-ai-signal-smoke \
              curl --fail --silent --show-error http://127.0.0.1:8080/v1/health
            then
              ready=true
              break
            fi
            if [ "$(docker inspect --format '{{.State.Running}}' ha-ai-signal-smoke)" != "true" ]; then
              break
            fi
            sleep 2
          done
          [ "$ready" = "true" ]
          docker exec ha-ai-signal-smoke sh -c \
            "grep -F 'command=signal-cli-native -Djava.io.tmpdir=/run/ha-ai-signal ' /etc/supervisor/conf.d/signal-cli-json-rpc-1.conf"
          docker exec ha-ai-signal-smoke sh -c \
            "find /run/ha-ai-signal -type f -name 'libsignal*.so' -print -quit | grep -q ."
          if docker exec ha-ai-signal-smoke sh -c \
            "find /tmp -name 'libsignal*' -print -quit | grep -q ."
          then
            echo "libsignal unexpectedly used Home Assistant's noexec /tmp" >&2
            exit 1
          fi
          docker exec ha-ai-signal-smoke sh -c \
            "supervisorctl -c /etc/supervisor/signal-bridge.conf status signal-cli-json-rpc-1 | grep -F RUNNING"
          if docker exec ha-ai-signal-smoke sh -c \
            "ps -eo comm= | grep -E '^(java|signal-cli)$'"
          then
            echo "The lightweight native bridge unexpectedly started a JVM process" >&2
            exit 1
          fi
          docker exec ha-ai-signal-smoke \
            supervisorctl -c /etc/supervisor/signal-bridge.conf status
