name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            homeassistant-readonly-agent/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r homeassistant-readonly-agent/requirements.txt
          python -m pip install -r requirements-dev.txt
      - name: Unit tests
        env:
          PYTHONPATH: homeassistant-readonly-agent
        run: python -m unittest discover -s tests -v
      - name: Compile
        run: python -m compileall -q homeassistant-readonly-agent/app
      - name: Lint
        run: ruff check homeassistant-readonly-agent/app tests
      - name: Types
        run: mypy homeassistant-readonly-agent/app
      - name: Static security analysis
        run: bandit -q -r homeassistant-readonly-agent/app
      - name: Dependency audit
        run: pip-audit -r homeassistant-readonly-agent/requirements.txt --disable-pip
