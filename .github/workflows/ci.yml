name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            homeassistant-readonly-agent/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r homeassistant-readonly-agent/requirements.txt
          python -m pip install -r requirements-dev.txt
      - name: Unit tests
        env:
          PYTHONPATH: homeassistant-readonly-agent
        run: python -m unittest discover -s tests -v
      - name: Compile
        run: python -m compileall -q homeassistant-readonly-agent/app
      - name: Lint
        run: ruff check homeassistant-readonly-agent/app tests
      - name: Types
        run: mypy homeassistant-readonly-agent/app
      - name: Static security analysis
        run: bandit -q -r homeassistant-readonly-agent/app
      - name: Dependency audit
        run: pip-audit -r homeassistant-readonly-agent/requirements.txt --disable-pip
