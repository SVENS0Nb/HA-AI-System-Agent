[program:signal-api]
command=/usr/bin/signal-cli-rest-api -signal-cli-config=%(ENV_SIGNAL_CLI_CONFIG_DIR)s
process_name=signal-api
autostart=true
autorestart=true
startsecs=1
startretries=10
stopasgroup=true
killasgroup=true
stopwaitsecs=20
user=signal-api
directory=/usr/bin
environment=HOME="/data/signal-cli"
redirect_stderr=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stdout_logfile_backups=0
