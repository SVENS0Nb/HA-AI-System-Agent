name: "HA AI System Agent"
version: "1.0.0"
slug: "homeassistant_readonly_agent"
description: >-
  HA AI System Agent with read-only diagnostics, optional confirmed entity control, Signal chat and persistent monitors.
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
stage: experimental
apparmor: true
backup: cold
tmpfs: true
watchdog: "http://[HOST]:[PORT:8099]/healthz"
ingress: true
ingress_port: 8099
panel_icon: mdi:home-analytics
panel_title: HA AI System Agent
panel_admin: true
homeassistant_api: true
hassio_api: true
hassio_role: homeassistant
map:
  - type: homeassistant_config
    read_only: true
    path: /homeassistant_config
options:
  openai_api_key: ""
  openai_model: "gpt-5.6-luna"
  reasoning_mode: "auto"
  reasoning_effort: "low"
  signal_mode: "integrated"
  signal_api_url: "http://127.0.0.1:8080"
  signal_api_token: ""
  signal_account: ""
  signal_self_chat_enabled: false
  allowed_senders: []
  timezone: "Europe/Berlin"
  learning_enabled: true
  anomaly_sensitivity: "balanced"
  memory_retention_days: 365
  max_memories_per_sender: 200
  intelligent_monitoring_enabled: true
  monitoring_event_retention_days: 7
  monitoring_minimum_baseline_samples: 20
  monitoring_unavailable_grace_period_seconds: 900
  monitoring_incident_grouping_window_seconds: 120
  monitoring_notification_minimum_priority: 50
  monitoring_update_timeout_multiplier: 3
  monitoring_llm_analysis_enabled: true
  monitoring_notifications_enabled: true
  monitoring_notify_on_resolve: true
  monitoring_daily_summaries_enabled: true
  monitoring_log_analysis_enabled: true
  monitoring_maintenance_mode: false
  monitoring_vacation_mode: false
  monitoring_quiet_hours_start: "23:00"
  monitoring_quiet_hours_end: "07:00"
  monitoring_notification_cooldown_seconds: 3600
  monitoring_context_max_chars: 30000
  entity_control_enabled: false
  controllable_entities: []
  allow_sensitive_config: false
  startup_message: true
  conversation_messages: 12
  max_config_file_kb: 192
  default_log_lines: 500
  openai_timeout_seconds: 90
  max_output_tokens: 1800
  max_tool_rounds: 8
  max_parallel_agent_runs: 2
  message_retention_days: 30
  max_messages_per_sender: 500
  max_monitors_per_sender: 50
  reconcile_interval_seconds: 60
schema:
  openai_api_key: password
  openai_model: str
  reasoning_mode: list(auto|fixed)
  reasoning_effort: list(none|low|medium|high|xhigh|max)
  signal_mode: list(integrated|external)
  signal_api_url: url
  signal_api_token: password
  signal_account: str
  signal_self_chat_enabled: bool
  allowed_senders:
    - str
  timezone: str
  learning_enabled: bool
  anomaly_sensitivity: list(conservative|balanced|sensitive)
  memory_retention_days: int(1,3650)
  max_memories_per_sender: int(10,1000)
  intelligent_monitoring_enabled: bool
  monitoring_event_retention_days: int(1,90)
  monitoring_minimum_baseline_samples: int(5,500)
  monitoring_unavailable_grace_period_seconds: int(0,86400)
  monitoring_incident_grouping_window_seconds: int(10,3600)
  monitoring_notification_minimum_priority: int(0,100)
  monitoring_update_timeout_multiplier: int(2,20)
  monitoring_llm_analysis_enabled: bool
  monitoring_notifications_enabled: bool
  monitoring_notify_on_resolve: bool
  monitoring_daily_summaries_enabled: bool
  monitoring_log_analysis_enabled: bool
  monitoring_maintenance_mode: bool
  monitoring_vacation_mode: bool
  monitoring_quiet_hours_start: str
  monitoring_quiet_hours_end: str
  monitoring_notification_cooldown_seconds: int(300,86400)
  monitoring_context_max_chars: int(5000,100000)
  entity_control_enabled: bool
  controllable_entities:
    - str
  allow_sensitive_config: bool
  startup_message: bool
  conversation_messages: int(2,30)
  max_config_file_kb: int(16,1024)
  default_log_lines: int(50,5000)
  openai_timeout_seconds: int(15,300)
  max_output_tokens: int(256,4096)
  max_tool_rounds: int(2,12)
  max_parallel_agent_runs: int(1,4)
  message_retention_days: int(1,365)
  max_messages_per_sender: int(20,5000)
  max_monitors_per_sender: int(1,200)
  reconcile_interval_seconds: int(30,900)
