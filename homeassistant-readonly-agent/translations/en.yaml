configuration:
  openai_api_key:
    name: OpenAI API key
    description: Can alternatively be stored in the add-on web interface.
  openai_model:
    name: OpenAI model
  reasoning_mode:
    name: Reasoning control
    description: Auto selects locally from none through high based on the task; fixed uses the configured effort.
  reasoning_effort:
    name: Fixed reasoning effort
  signal_mode:
    name: Signal connection mode
    description: Integrated starts the bridge automatically; external uses your own API.
  signal_api_url:
    name: Signal API URL
    description: Expert mode only; HTTP(S) address of the external signal-cli-rest-api.
  signal_api_token:
    name: Signal proxy token
    description: Optional bearer token for an authentication proxy.
  signal_account:
    name: Signal account number
    description: Detected automatically after QR linking in integrated mode.
  signal_self_chat_enabled:
    name: Use your Note to Self chat
    description: Also processes self-messages explicitly addressed to the account itself; disabled by default.
  allowed_senders:
    name: Allowed Signal senders
  timezone:
    name: Timezone
  learning_enabled:
    name: Enable local learning
    description: Builds local device baselines and a controlled knowledge base.
  anomaly_sensitivity:
    name: Behavior analysis sensitivity
  memory_retention_days:
    name: Maximum memory retention in days
  max_memories_per_sender:
    name: Maximum memories per sender
  intelligent_monitoring_enabled:
    name: Enable intelligent monitoring
    description: Locally turns Home Assistant events into profiles, baselines, anomalies, and grouped incidents.
  monitoring_event_retention_days:
    name: Event retention in days
  monitoring_minimum_baseline_samples:
    name: Minimum baseline samples
  monitoring_unavailable_grace_period_seconds:
    name: Unavailable-device grace period
  monitoring_incident_grouping_window_seconds:
    name: Incident grouping window
  monitoring_notification_minimum_priority:
    name: Minimum notification priority percent
  monitoring_update_timeout_multiplier:
    name: Missing-update interval multiplier
  monitoring_llm_analysis_enabled:
    name: Enable structured AI incident analysis
  monitoring_notifications_enabled:
    name: Send proactive incident notifications
  monitoring_notify_on_resolve:
    name: Send incident resolution notifications
  monitoring_daily_summaries_enabled:
    name: Generate hourly, daily and weekly summaries
  monitoring_log_analysis_enabled:
    name: Cluster and monitor logs locally
  monitoring_maintenance_mode:
    name: Enable maintenance mode
  monitoring_vacation_mode:
    name: Enable vacation mode
  monitoring_quiet_hours_start:
    name: Quiet hours start (HH:MM)
  monitoring_quiet_hours_end:
    name: Quiet hours end (HH:MM)
  monitoring_notification_cooldown_seconds:
    name: Notification repeat interval in seconds
  monitoring_context_max_chars:
    name: Maximum AI context size in characters
  entity_control_enabled:
    name: Enable confirmed device control
    description: Allows only fixed actions on supported entity domains; every action requires Signal confirmation.
  controllable_entities:
    name: Controllable entity IDs
    description: Explicit allowlist; at least one entity ID is required while control is enabled.
  allow_sensitive_config:
    name: Allow sensitive configuration
    description: Not recommended; permits reading secrets and authentication files.
  startup_message:
    name: Send startup message
  conversation_messages:
    name: Chat context size
  max_config_file_kb:
    name: Maximum config file size
  default_log_lines:
    name: Default log line count
  openai_timeout_seconds:
    name: OpenAI timeout in seconds
  max_output_tokens:
    name: Maximum output tokens
  max_tool_rounds:
    name: Maximum tool rounds
  max_parallel_agent_runs:
    name: Parallel agent runs
  message_retention_days:
    name: Chat retention in days
  max_messages_per_sender:
    name: Maximum messages per sender
  max_monitors_per_sender:
    name: Maximum monitors per sender
  reconcile_interval_seconds:
    name: State reconciliation interval
